{% extends "base.html" %}
{% block title %}GHOSTTRACE — Register{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:2rem;color:var(--cyan);letter-spacing:0.1em;">GHOST<span style="color:var(--orange);">TRACE</span></div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--grey);letter-spacing:0.25em;margin-top:0.5rem;">CREATE ANALYST ACCOUNT</div>
    </div>
    <div class="card">
      <div class="label" style="margin-bottom:1.5rem;">// New Account</div>
      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required maxlength="64"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required maxlength="128"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required minlength="8"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required minlength="8"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Create Account</button>
      </form>
    </div>
    <p style="text-align:center;font-size:0.82rem;margin-top:1rem;">Already registered? <a href="{{ url_for('auth.login') }}" style="color:var(--cyan);">Login</a></p>
  </div>
</div>
{% endblock %}
