{% extends "base.html" %}
{% block title %}GHOSTTRACE — Change Password{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:2rem;color:var(--cyan);letter-spacing:0.1em;">GHOST<span style="color:var(--orange);">TRACE</span></div>
    </div>
    <div class="card">
      <div class="label" style="margin-bottom:0.5rem;">// Security Notice</div>
      <p style="font-size:0.85rem;margin-bottom:1.5rem;">You are using a default password. You must set a new password before continuing.</p>
      <form method="POST">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new_password" required minlength="8" placeholder="Minimum 8 characters"/>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" name="confirm_password" required minlength="8"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Set Password & Continue</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
